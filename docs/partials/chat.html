<section id="chat" class="section-container">
    <div class="section-header">
        <span class="section-number">06</span>
        <div class="section-title">
            <span class="title-main">ASK AI</span>
            <span class="title-jp">AIに聞く</span>
        </div>
        <div class="section-line"></div>
    </div>

    <div class="chat-grid">
        <div class="chat-intro">
            <div class="quote-mark">"</div>
            <p class="about-text">
                Have questions about my
                <span class="text-accent-red">skills, projects,</span>
                or <span class="text-accent-red">experience</span>? Ask the AI assistant! It knows everything about me.
            </p>
            <div class="chat-hints">
                <button class="hint-chip" onclick="sendHint('What tech stack does Rio use?')">Tech Stack</button>
                <button class="hint-chip" onclick="sendHint('Tell me about Rio\'s projects')">Projects</button>
                <button class="hint-chip" onclick="sendHint('How can I contact Rio?')">Contact</button>
                <button class="hint-chip" onclick="sendHint('What is Rio\'s background?')">Background</button>
            </div>
        </div>

        <div class="chat-box">
            <div class="chat-messages" id="chat-messages">
                <div class="chat-msg ai">
                    <div class="msg-bubble">
                        Hey! I'm RUI, Rio's AI assistant. Ask me anything about his skills, projects, or experience. 👋
                    </div>
                </div>
            </div>

            <div class="chat-inputbar">
                <textarea id="chat-input" class="chat-textarea" rows="1"
                    placeholder="Ask something about Rio..."></textarea>
                <button id="chat-send" class="chat-send-btn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</section>
